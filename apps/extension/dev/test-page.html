<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>RusType Extension Test Page</title>
    <style>
      :root {
        color-scheme: light;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f4;
        color: #1f2a24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      main {
        width: min(820px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      h1 {
        margin: 0 0 20px;
        font-size: 30px;
      }

      section {
        border: 1px solid #d9ded8;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
        margin-top: 14px;
      }

      label,
      h2 {
        display: block;
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 800;
      }

      input,
      textarea,
      [contenteditable] {
        width: 100%;
        border: 1px solid #cbd3cc;
        border-radius: 7px;
        color: #1f2a24;
        font: inherit;
        line-height: 1.5;
        padding: 10px;
      }

      [contenteditable] {
        min-height: 96px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>RusType Extension Test Page</h1>

      <section>
        <label for="textInput">Input</label>
        <input id="textInput" type="text" value="при">
      </section>

      <section>
        <label for="textareaInput">Textarea</label>
        <textarea id="textareaInput" rows="5">спа</textarea>
      </section>

      <section hidden data-phase="phase-6-paused">
        <label for="grammarInput">Grammar rules (paused)</label>
        <textarea id="grammarInput" rows="6">это это хорошо
привет  как дела
привет , как дела
привет,как дела
я есть студент
пoнимаю</textarea>
      </section>

      <section>
        <h2>Contenteditable</h2>
        <div contenteditable="true">Привет как дила. Я изучаю русский язык.</div>
      </section>

      <section>
        <label for="passwordInput">Password field should be ignored</label>
        <input id="passwordInput" type="password" value="Привет">
      </section>
    </main>
  </body>
</html>
